version: '3.8'

services:
  # Databases
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ridego
      POSTGRES_PASSWORD: ridego_password
      POSTGRES_DB: ridego_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ridego"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  api-gateway:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - user-service
      - trip-service
      - tracking-service
      - notification-service
      - finance-service
      - report-service

  # Microservices
  auth-service:
    build: ./services/auth-service
    environment:
      DATABASE_URL: postgresql://ridego:ridego_password@postgres:5432/ridego_db
      JWT_SECRET: your-secret-key
      ENVIRONMENT: development
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  user-service:
    build: ./services/user-service
    environment:
      DATABASE_URL: postgresql://ridego:ridego_password@postgres:5432/ridego_db
      ENVIRONMENT: development
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  trip-service:
    build: ./services/trip-service
    environment:
      DATABASE_URL: postgresql://ridego:ridego_password@postgres:5432/ridego_db
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  tracking-service:
    build: ./services/tracking-service
    environment:
      DATABASE_URL: postgresql://ridego:ridego_password@postgres:5432/ridego_db
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ENVIRONMENT: development
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build: ./services/notification-service
    environment:
      DATABASE_URL: postgresql://ridego:ridego_password@postgres:5432/ridego_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ENVIRONMENT: development
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  finance-service:
    build: ./services/finance-service
    environment:
      DATABASE_URL: postgresql://ridego:ridego_password@postgres:5432/ridego_db
      ENVIRONMENT: development
    ports:
      - "8006:8006"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  report-service:
    build: ./services/report-service
    environment:
      DATABASE_URL: postgresql://ridego:ridego_password@postgres:5432/ridego_db
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
    ports:
      - "8007:8007"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  default:
    name: ridego-network
